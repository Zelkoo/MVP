services:
  backend:
    build:
      context: ./backend
    container_name: qa-agent-backend
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATA_DIR: /app/data
      UPLOADS_DIR: /app/uploads
      SCREENSHOTS_DIR: /app/uploads/screenshots
      SKIP_PLAYWRIGHT_INSTALL: "1"
    volumes:
      - qa-data:/app/data
      - qa-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  frontend:
    build:
      context: ./frontend
    container_name: qa-agent-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qa-data:
  qa-uploads:
